<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <!-- Board Header -->
            <div class="board-header">
                <div class="board-title">
                    <h1>Messe-Planung - Kanban Board</h1>
                </div>
                <div class="board-actions">
                    <button class="add-task-btn"><i class="fas fa-plus"></i> Add new Task</button>
                    <div class="filter-actions">
                        <button><i class="fas fa-filter"></i> Filter</button>
                        <button><i class="fas fa-eye"></i> View</button>
                    </div>
                </div>
            </div>

            <!-- Kanban Board -->
            <div class="kanban-board">
                <!-- Planned Column -->
                <div class="kanban-column" id="planned" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="column-header">
                        <div class="column-info">
                            <span class="count">0</span>
                            <h2>Planned</h2>
                        </div>
                        <p class="hint"><i class="fas fa-arrows-alt"></i> Move tasks between columns</p>
                    </div>
                    <div class="task-list" id="planned-tasks">
                        <!-- Tasks will be added here -->
                    </div>
                </div>

                <!-- In Progress Column -->
                <div class="kanban-column" id="in-progress" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="column-header">
                        <div class="column-info">
                            <span class="count">0</span>
                            <h2>In Progress</h2>
                        </div>
                        <p class="hint"><i class="fas fa-arrows-alt"></i> Move tasks between columns</p>
                    </div>
                    <div class="task-list" id="in-progress-tasks">
                        <!-- Tasks will be added here -->
                    </div>
                </div>

                <!-- Done Column -->
                <div class="kanban-column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="column-header">
                        <div class="column-info">
                            <span class="count">0</span>
                            <h2>Done</h2>
                        </div>
                        <p class="hint"><i class="fas fa-arrows-alt"></i> Move tasks between columns</p>
                    </div>
                    <div class="task-list" id="done-tasks">
                        <!-- Tasks will be added here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for adding tasks -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Task</h2>
            <form id="addTaskForm">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label for="taskTag">Tag (e.g., DUE, NEW)</label>
                    <input type="text" id="taskTag" placeholder="NEW">
                </div>
                <div class="form-group">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                <div class="form-group">
                    <label for="taskAssignee">Assignee</label>
                    <input type="text" id="taskAssignee">
                </div>
                <div class="form-group">
                    <label for="taskEffort">Effort (1-3)</label>
                    <input type="number" id="taskEffort" min="1" max="3" value="1">
                </div>
                <button type="submit" class="submit-btn">Add Task</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
