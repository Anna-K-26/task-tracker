<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | Task Tracker</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -1px;
        }
        .auth-title {
            font-size: 24px;
            color: #1a1a1b;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .auth-subtitle {
            font-size: 14px;
            color: #65676b;
            margin-bottom: 30px;
        }
        .auth-form .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .auth-form label {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
            color: #1a1a1b;
        }
        .auth-form input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e4e6eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            background-color: #f9f9f9;
        }
        .auth-form input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 191, 165, 0.1);
        }
        .auth-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .auth-submit:hover {
            background-color: #00b29a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 191, 165, 0.2);
        }
        .auth-switch {
            margin-top: 25px;
            font-size: 14px;
            color: #65676b;
        }
        .auth-switch a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ff5252;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            padding: 10px;
            background-color: #fff0f0;
            border-radius: 8px;
            border: 1px solid #ffdada;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-tasks"></i>
            <span>TaskTracker</span>
        </div>
        
        <div id="loginSection">
            <h1 class="auth-title">С возвращением!</h1>
            <p class="auth-subtitle">Войдите в свой аккаунт, чтобы продолжить работу</p>
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Логин</label>
                    <input type="text" id="loginUsername" required placeholder="Введите ваш логин">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-submit">Войти</button>
                <div id="loginError" class="error-message"></div>
            </form>
            
            <div class="auth-switch">
                Нет аккаунта? <a href="#" onclick="toggleAuth(event, 'register')">Зарегистрироваться</a>
            </div>
        </div>

        <div id="registerSection" style="display: none;">
            <h1 class="auth-title">Создать аккаунт</h1>
            <p class="auth-subtitle">Начните управлять задачами эффективно</p>
            
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="regDisplayName">Ваше имя (как к вам обращаться)</label>
                    <input type="text" id="regDisplayName" required placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label for="regUsername">Логин (для входа)</label>
                    <input type="text" id="regUsername" required placeholder="Придумайте логин">
                </div>
                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-submit">Зарегистрироваться</button>
                <div id="registerError" class="error-message"></div>
            </form>
            
            <div class="auth-switch">
                Уже есть аккаунт? <a href="#" onclick="toggleAuth(event, 'login')">Войти</a>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth(e, type) {
            e.preventDefault();
            const loginSection = document.getElementById('loginSection');
            const registerSection = document.getElementById('registerSection');
            
            if (type === 'register') {
                loginSection.style.display = 'none';
                registerSection.style.display = 'block';
            } else {
                loginSection.style.display = 'block';
                registerSection.style.display = 'none';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.detail || 'Ошибка входа';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сервера';
                errorDiv.style.display = 'block';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const displayName = document.getElementById('regDisplayName').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('registerError');

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayName, username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.detail || 'Ошибка регистрации';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сервера';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
