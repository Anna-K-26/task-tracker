<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <!-- Board Header -->
            <div class="board-header">
                <div class="board-title-row">
                    <div class="board-title">
                        <h1 id="board-title-text">Kanban Board</h1>
                    </div>
                    <div class="view-switcher">
                        <button class="switcher-btn active" id="kanban-view">Канбан-доска</button>
                        <button class="switcher-btn" id="gantt-view">Диаграмма Ганта</button>
                    </div>
                </div>
            </div>

            <!-- Kanban Board -->
            <div class="kanban-board" id="kanban-container">
                <!-- Planned Column -->
                <div class="kanban-column" id="planned" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="column-header">
                        <div class="column-info">
                            <i class="fas fa-ellipsis-v"></i>
                            <h2>К работе</h2>
                        </div>
                        <div class="column-actions">
                            <select class="sort-select" onchange="changeSort('planned', this.value)">
                                <option value="none">Сортировка</option>
                                <option value="startDate">По дате начала</option>
                                <option value="endDate">По дате окончания</option>
                                <option value="priority">По приоритету</option>
                            </select>
                            <button class="add-task-col-btn" onclick="openModal('planned')">
                                <i class="fas fa-plus"></i> Добавить задачу
                            </button>
                        </div>
                    </div>
                    <div class="task-list" id="planned-tasks">
                        <!-- Tasks will be added here -->
                    </div>
                </div>

                <!-- In Progress Column -->
                <div class="kanban-column" id="in-progress" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="column-header">
                        <div class="column-info">
                            <i class="fas fa-ellipsis-v"></i>
                            <h2>В работе</h2>
                        </div>
                        <div class="column-actions">
                            <select class="sort-select" onchange="changeSort('in-progress', this.value)">
                                <option value="none">Сортировка</option>
                                <option value="startDate">По дате начала</option>
                                <option value="endDate">По дате окончания</option>
                                <option value="priority">По приоритету</option>
                            </select>
                            <button class="add-task-col-btn" onclick="openModal('in-progress')">
                                <i class="fas fa-plus"></i> Добавить задачу
                            </button>
                        </div>
                    </div>
                    <div class="task-list" id="in-progress-tasks">
                        <!-- Tasks will be added here -->
                    </div>
                </div>

                <!-- Done Column -->
                <div class="kanban-column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="column-header">
                        <div class="column-info">
                            <i class="fas fa-ellipsis-v"></i>
                            <h2>Готово</h2>
                        </div>
                        <div class="column-actions">
                            <select class="sort-select" onchange="changeSort('done', this.value)">
                                <option value="none">Сортировка</option>
                                <option value="startDate">По дате начала</option>
                                <option value="endDate">По дате окончания</option>
                                <option value="priority">По приоритету</option>
                            </select>
                            <button class="add-task-col-btn" onclick="openModal('done')">
                                <i class="fas fa-plus"></i> Добавить задачу
                            </button>
                        </div>
                    </div>
                    <div class="task-list" id="done-tasks">
                        <!-- Tasks will be added here -->
                    </div>
                </div>
            </div>

            <!-- Gantt Chart -->
            <div class="gantt-container" id="gantt-container" style="display: none;">
                <div class="gantt-controls">
                    <div class="gantt-controls-left">
                        <div class="scale-switcher">
                            <button class="scale-btn" data-scale="day">День</button>
                            <button class="scale-btn active" data-scale="week">Неделя</button>
                            <button class="scale-btn" data-scale="month">Месяц</button>
                        </div>
                        <div class="gantt-navigation">
                            <button class="nav-btn" id="prev-period"><i class="fas fa-chevron-left"></i></button>
                            <button class="nav-btn" id="next-period"><i class="fas fa-chevron-right"></i></button>
                            <button class="nav-btn" id="today-btn">Сегодня</button>
                        </div>
                    </div>
                    <div class="gantt-controls-right">
                        <div class="filter-group">
                            <label for="assignee-filter">Ответственный:</label>
                            <input type="text" id="assignee-filter" class="filter-input" list="assignee-list" placeholder="Все сотрудники">
                            <datalist id="assignee-list">
                                <!-- Options will be populated by JS -->
                            </datalist>
                        </div>
                    </div>
                </div>
                <div class="gantt-chart-wrapper">
                    <div class="gantt-grid-header" id="gantt-grid-header">
                        <!-- Header will be generated by JS -->
                    </div>
                    <div class="gantt-body" id="gantt-body">
                        <!-- Body will be generated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for adding tasks -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Добавить задачу</h2>
            <form id="addTaskForm">
                <input type="hidden" id="taskId">
                <input type="hidden" id="taskStatus">
                <div class="form-group">
                    <label for="taskTitle">Название задачи (до 100 символов)</label>
                    <input type="text" id="taskTitle" maxlength="100" required placeholder="Введите название...">
                </div>
                <div class="form-group">
                    <label for="taskAssignee">Ответственный</label>
                    <input type="text" id="taskAssignee" maxlength="50" required placeholder="Введите имя или ID...">
                </div>
                <div class="form-group">
                    <label for="taskPriority">Приоритет</label>
                    <select id="taskPriority" required>
                        <option value="1">Низкий</option>
                        <option value="2" selected>Средний</option>
                        <option value="3">Высокий</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="startDate">Дата начала</label>
                    <input type="date" id="startDate" required>
                </div>
                <div class="form-group">
                    <label for="endDate">Дата окончания</label>
                    <input type="date" id="endDate" required>
                </div>
                <div class="form-group">
                    <label for="taskComment">Комментарий (до 500 символов)</label>
                    <textarea id="taskComment" maxlength="500" rows="4" placeholder="Введите комментарий..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" id="deleteTaskBtn" class="delete-task-btn" style="display: none;">Удалить</button>
                    <button type="submit" class="submit-btn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
